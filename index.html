<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prescript: DEVICE</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'DotGothic16', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .logo {
            width: 220px;
            margin-bottom: 40px;
            pointer-events: none;
            filter: drop-shadow(0 0 15px rgba(135, 206, 235, 0.8));
        }

        #display-text {
            font-size: 2.2rem;
            text-align: center;
            max-width: 85%;
            line-height: 1.6;
            white-space: pre-wrap;
            text-shadow: 
                0 0 10px rgba(135, 206, 235, 1),
                0 0 20px rgba(135, 206, 235, 0.8);
        }

        @media (max-width: 600px) {
            #display-text { font-size: 1.3rem; }
        }
    </style>
</head>
<body onclick="handleAction()">

    <audio id="click-sound" src="index_message_1.wav"></audio>

    <img src="The_Index_Logo.png" alt="Logo" class="logo">
    <div id="display-text">指令を開始する。</div>

    <script>
        const displayText = document.getElementById('display-text');
        const clickSound = document.getElementById('click-sound');
        let isProcessing = false;
        let step = 1;

        const missions = [
            "腕立て伏せを20回実行せよ。\n期限：10分以内",
            "スクワットを50回実行せよ。\n期限：15分以内",
            "背筋を伸ばし、30分間正しい姿勢を維持せよ。\n期限：30分間",
            "プランクを1分間、2セット完遂せよ。\n期限：10分以内",
            "利き手と逆の手で、自分の名前を10回紙に書け。\n期限：5分以内",
            "片足立ちで1分間静止せよ。左右行え。\n期限：即時",
            "今すぐ全力でその場で足踏みを100回行え。\n期限：3分以内",
            "今後3時間、一切の「間食」を禁ずる。\n期限：3時間",
            "明日まで「鏡」を見ることを一切禁ずる。\n期限：明日の起床まで",
            "1時間、スマートフォン等の電子機器の使用を断て。\n期限：1時間",
            "次の食事、一切の「飲み物」を摂取せずに完食せよ。\n期限：次回の食事",
            "本日の残り時間、椅子に座ることを禁ずる。\n期限：本日24時まで",
            "今後2時間、SNSのタイムライン閲覧を禁ずる。\n期限：2時間",
            "明日の朝まで、一切の「カフェイン」摂取を禁ずる。\n期限：明日の朝",
            "語尾に「～にゃん」をつけて会話せよ。\n期限：1時間",
            "独り言で自分を10回褒めちぎれ。\n期限：5分以内",
            "次に話す人物に対し、必ず一つお世辞を言え。\n期限：次回の会話",
            "10分間、一切の「喜怒哀楽」を表情に出すな。\n期限：10分間",
            "「私は人差し指の駒である」と3回唱えよ。\n期限：即時",
            "身近な誰かに、脈絡なく感謝のメッセージを送れ。\n期限：10分以内",
            "今日一日、一人称を「拙者」に固定せよ。\n期限：本日中",
            "身の回りのゴミを5つ拾い、処分せよ。\n期限：10分以内",
            "現在地から最も近い窓をすべて拭け。\n期限：30分以内",
            "財布の中のレシートをすべて破棄し、整理せよ。\n期限：15分以内",
            "靴箱にある靴をすべて揃え直せ。\n期限：10分以内",
            "今、カバンの中にあるものをすべて出し、整理して戻せ。\n期限：20分以内",
            "コップ一杯の白湯をゆっくり飲み干せ。\n期限：5分以内",
            "コイントスで表が出るまで続けろ。\n期限：完遂まで",
            "身近な人物に「今何時？」と聞き、その分数をスクワットせよ。\n期限：10分以内",
            "次に目が合った人物の動作を一つ模倣せよ。\n期限：次回の遭遇",
            "本日のラッキーアイテムを探し出し、身につけろ。\n期限：本日中",
            "5分間、利き手を使わずに生活せよ。\n期限：5分間",
            "今すぐ立ち上がり、時計回りに3回まわれ。\n期限：即時",
            "今日寝るまで、すべてのドアを「左手」で開けよ。\n期限：就寝まで",
            "冷水で30秒間、手を冷やし続けろ。\n期限：即時",
            "1分間、目を閉じて周囲の音だけに集中せよ。\n期限：即時",
            "今すぐスマホの通知をすべてオフにせよ。\n期限：1時間"
        ];

        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789■□@#$%&*+!?";

        function handleAction() {
            if (isProcessing) return;

            if (step === 1) {
                if(clickSound) {
                    clickSound.currentTime = 0;
                    clickSound.play().catch(e => console.log("Audio play blocked"));
                }
                
                isProcessing = true;
                startAdvancedTyper();
            } else {
                location.reload();
            }
        }

        function startAdvancedTyper() {
            const mission = missions[Math.floor(Math.random() * missions.length)];
            let iteration = 0;
            
            // 音声の長さ（約2秒）に合わせて速度を自動計算
            // 30msごとの更新で、2秒（2000ms）なら約66回の更新
            // 文字数 / 66回 = 1フレームあたりの増加量
            const totalFrames = 60; 
            const speed = mission.length / totalFrames;

            const timer = setInterval(() => {
                displayText.innerText = mission
                    .split("")
                    .map((char, index) => {
                        if (index < Math.floor(iteration)) {
                            return mission[index];
                        }
                        if (char === "\n") return "\n";
                        return chars[Math.floor(Math.random() * chars.length)];
                    })
                    .join("");

                if (iteration >= mission.length) {
                    clearInterval(timer);
                    isProcessing = false;
                    step = 2;
                }

                iteration += speed; 
            }, 30);
        }
    </script>
</body>
</html>
