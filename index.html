<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prescript: DEVICE</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'DotGothic16', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .logo {
            width: 220px;
            margin-bottom: 40px;
            pointer-events: none;
            filter: drop-shadow(0 0 15px rgba(135, 206, 235, 0.8));
        }

        #display-text {
            font-size: 2.2rem;
            text-align: center;
            max-width: 85%;
            line-height: 1.6;
            white-space: pre-wrap;
            text-shadow: 
                0 0 10px rgba(135, 206, 235, 1),
                0 0 20px rgba(135, 206, 235, 0.8);
        }

        @media (max-width: 600px) {
            #display-text { font-size: 1.2rem; }
        }
    </style>
</head>
<body onclick="handleAction()">

    <audio id="click-sound" src="index_message_1.wav"></audio>

    <img src="The_Index_Logo.png" alt="Logo" class="logo">
    <div id="display-text">指令を開始する。</div>

    <script>
        const displayText = document.getElementById('display-text');
        const clickSound = document.getElementById('click-sound');
        let isProcessing = false;
        let step = 1;

        // --- 指令データベース（100種類以上） ---
        const missions = [
            // 【身体・運動系】
            "腕立て伏せを20回実行せよ。\n期限：10分以内",
            "スクワットを50回実行せよ。\n期限：15分以内",
            "プランクを1分間、3セット完遂せよ。\n期限：15分以内",
            "片足立ちで1分間静止せよ。左右行え。\n期限：即時",
            "全力でその場で足踏みを100回行え。\n期限：3分以内",
            "腹筋を30回、高速で実行せよ。\n期限：5分以内",
            "今すぐ立ち上がり、全力で背伸びを10回行え。\n期限：2分以内",
            "「空気椅子」を45秒間耐え抜け。\n期限：即時",
            "利き手と逆の手で、自身のフルネームを10回書け。\n期限：10分以内",
            "両手を水平に広げ、3分間そのまま維持せよ。\n期限：3分間",
            "10回、限界まで高くジャンプせよ。\n期限：3分以内",
            "部屋の端から端まで、四つん這いで往復せよ。\n期限：5分以内",

            // 【制限・禁止系】
            "今後3時間、一切の「間食」を禁ずる。\n期限：3時間",
            "明日まで「鏡」を見ることを一切禁ずる。\n期限：明日の起床まで",
            "1時間、スマートフォン等の電子機器の使用を断て。\n期限：1時間",
            "次の食事、一切の「飲み物」を摂取せずに完食せよ。\n期限：次回の食事",
            "本日の残り時間、椅子に座ることを禁ずる。\n期限：本日24時まで",
            "今後2時間、SNSの閲覧を一切禁ずる。\n期限：2時間",
            "明日の朝まで、一切の「カフェイン」摂取を禁ずる。\n期限：明日の朝",
            "今から1時間、一切の「発声」を禁ずる。\n期限：1時間",
            "今後24時間、いかなる「肉類」の摂取を禁ずる。\n期限：24時間",
            "30分間、一切の「まばたき」以外の顔の動きを禁ずる。\n期限：30分間",
            "今日寝るまで、一切の「横文字（カタカナ語）」を禁ずる。\n期限：就寝まで",
            "次の外出時、エレベーターとエスカレーターの使用を禁ずる。\n期限：次回外出時",

            // 【言動・精神系】
            "語尾に「～にゃん」をつけて会話せよ。\n期限：1時間",
            "鏡に向かって自分を10回褒めちぎれ。\n期限：5分以内",
            "次に話す人物に対し、必ず一つお世辞を言え。\n期限：次回の会話",
            "「私は人差し指の駒である」と3回唱えよ。\n期限：即時",
            "身近な誰かに、脈絡なく感謝のメッセージを送れ。\n期限：10分以内",
            "今日一日、一人称を「拙者」に固定せよ。\n期限：本日中",
            "今すぐ、窓を開けて外の空気を深く3回吸え。\n期限：即時",
            "「ありがとうございます」と10回、心を込めて音読せよ。\n期限：3分以内",
            "今考えている不安を、すべて紙に書き出し破り捨てろ。\n期限：10分以内",
            "1分間、自身の呼吸の音だけに集中せよ。\n期限：1分間",
            "今日一日、誰に対しても「否定語」を使うな。\n期限：本日中",
            "次にすれ違う人の幸せを、心の中で密かに祈れ。\n期限：次回外出時",

            // 【日常・整理系】
            "身の回りのゴミを5つ拾い、処分せよ。\n期限：10分以内",
            "現在地から最も近い窓を拭け。\n期限：20分以内",
            "財布の中の不要なレシートをすべて破棄せよ。\n期限：15分以内",
            "靴箱にある靴をすべて揃え直せ。\n期限：10分以内",
            "今、カバンの中身をすべて出し、整理して戻せ。\n期限：20分以内",
            "コップ一杯の白湯をゆっくり飲み干せ。\n期限：5分以内",
            "スマホの画面を専用の布できれいに拭け。\n期限：3分以内",
            "キーボードの隙間にあるゴミを掃除せよ。\n期限：15分以内",
            "冷蔵庫の中にある、賞味期限が近いものを確認せよ。\n期限：10分以内",
            "本棚の端にある一冊を手に取り、3ページだけ読め。\n期限：10分以内",
            "今着ている服を丁寧にたたみ直せ。\n期限：5分以内",
            "洗面所の鏡をピカピカに磨き上げろ。\n期限：15分以内",

            // 【特殊・シュール系】
            "コイントスで表が出るまで続けろ。\n期限：完遂まで",
            "身近な人物に「今何時？」と聞き、その分数をスクワットせよ。\n期限：10分以内",
            "次に目が合った人物の動作を一つ模倣せよ。\n期限：次回の遭遇",
            "本日のラッキーアイテムを探し出し、身につけろ。\n期限：本日中",
            "スマホのカメラロールを遡り、1年前の今日の写真を確認せよ。\n期限：5分以内",
            "今すぐ立ち上がり、時計回りに3回まわれ。\n期限：即時",
            "今日寝るまで、すべてのドアを「左手」で開けよ。\n期限：就寝まで",
            "一番最近届いたメールの、3行目の文字を音読せよ。\n期限：3分以内",
            "今、心に浮かんだ四字熟語を検索し、意味を噛みしめよ。\n期限：5分以内",
            "5分間、一切の音を立てずに生活せよ。\n期限：5分間",
            "自身の目標を一つ、紙に書き出し、壁に貼れ。\n期限：30分以内",
            "今日寝る前に、明日の自分への伝言をメモに残せ。\n期限：就寝まで",
            "今、視界に入っている「赤いもの」をすべて数え上げろ。\n期限：2分以内",
            "1分間、目を閉じて「宇宙の終わり」について思考せよ。\n期限：即時",
            "身近なペンを一本選び、そのインクが切れるまで円を描け。\n期限：完遂まで",
            "次に飲む飲料を、ワインのように味わって飲め。\n期限：次回の水分補給",
            "10分間、AIになったつもりで行動せよ。\n期限：10分間",
            "今すぐ、利き手ではない方の手で歯を磨け。\n期限：次回の歯磨き",
            "自身の靴の裏を点検し、石が挟まっていたら除去せよ。\n期限：10分以内",
            "空を見上げ、雲の形が何に見えるか3つ答えよ。\n期限：10分以内（夜間は星）",
            "1分間、自身の脈拍を数え、記録せよ。\n期限：3分以内",
            "「あいうえお」の逆、「ん」から順に発声せよ。\n期限：3分以内",
            "今すぐ、一番近くにある本を開き、10文字目を読み上げろ。\n期限：即時",
            "自身を「観測者」と仮定し、周囲の状況を客観的に実況せよ。\n期限：5分間",
            "スマホの壁紙を、初期設定のものに変更せよ。\n期限：10分以内",
            "10分間、自身の利き足を一歩も動かさずに過ごせ。\n期限：10分間",
            "興味のないアプリをインストールし、その後直ちにアンインストールせよ。\n期限：今日中",
            "身近な植物（あれば）に、優しく声をかけろ。\n期限：本日中",
            "今すぐ、耳たぶを30秒間マッサージせよ。\n期限：即時",
            "次の食事、一口ごとに箸を置け。\n期限：次回の食事",
            "身の回りの「青いもの」を3つ集め、三角形に並べろ。\n期限：5分以内",
            "1分間、自身の名前を逆から書き続けろ。\n期限：5分以内",
            "今から30分間、一切の「時計」を見ることを禁ずる。\n期限：30分間",
            "指をパチンと鳴らせ。\n期限：即時",
            "本日の「最高気温」を調べ、その数値分だけ深呼吸せよ。\n期限：10分以内",
            "自身の影をじっと見つめ、対話せよ。\n期限：3分間",
            "今日、誰にも気づかれないように「善行」を一つ積め。\n期限：本日中",
            "今すぐ、足の指をグー・チョキ・パーの形に動かせ。\n期限：即時",
            "10分間、自身が「彫像」であるかのように振る舞え。\n期限：10分間",
            "次に開くドアの前で、一礼してから入れ。\n期限：次回の移動",
            "「人差し指」のロゴを30秒間凝視せよ。\n期限：即時"
        ];

        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789■□@#$%&*+!?";

        function handleAction() {
            if (isProcessing) return;

            if (step === 1) {
                if(clickSound) {
                    clickSound.currentTime = 0;
                    clickSound.play().catch(e => console.log("Audio play blocked"));
                }
                
                isProcessing = true;
                startAdvancedTyper();
            } else {
                location.reload();
            }
        }

        function startAdvancedTyper() {
            const mission = missions[Math.floor(Math.random() * missions.length)];
            let iteration = 0;
            
            // 音声(約2秒)に同期させる設定
            const totalFrames = 60; 
            const speed = mission.length / totalFrames;

            const timer = setInterval(() => {
                displayText.innerText = mission
                    .split("")
                    .map((char, index) => {
                        if (index < Math.floor(iteration)) {
                            return mission[index];
                        }
                        if (char === "\n") return "\n";
                        return chars[Math.floor(Math.random() * chars.length)];
                    })
                    .join("");

                if (iteration >= mission.length) {
                    clearInterval(timer);
                    isProcessing = false;
                    step = 2;
                }

                iteration += speed; 
            }, 30);
        }
    </script>
</body>
</html>
